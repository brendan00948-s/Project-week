<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Universe - Movies</title>
  <meta http-equiv="refresh" content="0; url=games.html?page=movies-page">
  <script>
    (function () {
      const target = new URL("games.html", window.location.href);
      target.searchParams.set("page", "movies-page");
      const sourceParams = new URLSearchParams(window.location.search);
      const movieId = String(sourceParams.get("movie") || "").trim();
      if (movieId) target.searchParams.set("movie", movieId);
      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  Redirecting to Movies...
</body>
</html>
